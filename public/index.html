<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar Panel Voltage Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
      animation: slideDown 0.6s ease-out;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: fadeIn 0.6s ease-out;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.25);
    }

    .stat-card {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .stat-label {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .stat-value {
      font-size: 2.5em;
      font-weight: bold;
      color: #667eea;
      font-variant-numeric: tabular-nums;
    }

    .stat-value.unit {
      font-size: 1.2em;
      color: #999;
      font-weight: 500;
    }

    .status {
      font-size: 0.85em;
      margin-top: 10px;
      padding: 8px 12px;
      background: #f0f4ff;
      border-radius: 6px;
      color: #667eea;
      font-weight: 500;
    }

    .status.loading::before {
      content: "●";
      animation: blink 1.5s infinite;
      margin-right: 6px;
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0.4; }
    }

    .chart-container {
      position: relative;
      height: 400px;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      animation: fadeIn 0.6s ease-out;
    }

    .chart-title {
      font-size: 1.3em;
      color: #333;
      margin-bottom: 15px;
      font-weight: 600;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      background: white;
      border: 2px solid #667eea;
      border-radius: 8px;
      color: #667eea;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.95em;
    }

    button:hover {
      background: #667eea;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    button.active {
      background: #667eea;
      color: white;
    }

    .timestamp {
      font-size: 0.85em;
      color: #999;
      margin-top: 15px;
      text-align: center;
      border-top: 1px solid #eee;
      padding-top: 15px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .empty-state svg {
      width: 60px;
      height: 60px;
      margin-bottom: 15px;
      opacity: 0.5;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 1.8em;
      }

      .dashboard {
        grid-template-columns: 1fr;
      }

      .chart-container {
        height: 300px;
      }

      .controls {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }

    .alert {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
      color: #856404;
      font-size: 0.95em;
    }

    .alert.error {
      background: #f8d7da;
      border-left-color: #dc3545;
      color: #721c24;
    }

    .alert.success {
      background: #d4edda;
      border-left-color: #28a745;
      color: #155724;
    }

    .critical-warning {
      display: none;
      background: #b00020;
      color: #fff;
      border: 3px solid #ff6b6b;
      font-size: 1.15em;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      animation: pulseWarn 1s infinite;
    }

    @keyframes pulseWarn {
      0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.6); }
      70% { box-shadow: 0 0 0 16px rgba(255, 0, 0, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
    }

    .panel-status-card {
      margin-top: 20px;
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
    }

    .panel-status-title {
      font-size: 1.2em;
      font-weight: 700;
      margin-bottom: 12px;
      color: #333;
    }

    .panel-status-badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.85em;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .panel-status-badge.idle { background: #e9ecef; color: #495057; }
    .panel-status-badge.running { background: #fff3cd; color: #856404; }
    .panel-status-badge.ok { background: #d4edda; color: #155724; }
    .panel-status-badge.warning { background: #f8d7da; color: #721c24; }
    .panel-status-badge.error { background: #f8d7da; color: #721c24; }

    .bc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .bc-grid input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95em;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>☀️ Solar Panel Monitor</h1>
      <p>Real-time voltage tracking with 7-day history</p>
    </header>

    <div id="alertContainer"></div>
    <div id="criticalWarning" class="critical-warning"></div>

    <div class="controls">
      <button class="active" onclick="setAutoRefresh(true)">🔄 Auto-refresh ON</button>
      <button onclick="setAutoRefresh(false)">⏸️ Auto-refresh OFF</button>
      <button onclick="loadData()">🔁 Refresh Now</button>
      <button onclick="connectWallet()">🦊 Connect MetaMask</button>
      <button onclick="runPanelCheck()">⛓️ Run Panel Check</button>
    </div>

    <div class="dashboard">
      <div class="card stat-card">
        <div class="stat-label">Current Voltage</div>
        <div>
          <span class="stat-value" id="currentVoltage">—</span>
          <span class="stat-value unit">V</span>
        </div>
        <div class="status" id="currentStatus">Waiting for data...</div>
      </div>

      <div class="card stat-card">
        <div class="stat-label">7-Day Average</div>
        <div>
          <span class="stat-value" id="avgVoltage">—</span>
          <span class="stat-value unit">V</span>
        </div>
        <div class="status">Last 7 days</div>
      </div>

      <div class="card stat-card">
        <div class="stat-label">Min / Max</div>
        <div>
          <span class="stat-value" id="minMaxVoltage">— / —</span>
          <span class="stat-value unit">V</span>
        </div>
        <div class="status">7-day range</div>
      </div>

      <div class="card stat-card">
        <div class="stat-label">Data Points</div>
        <div>
          <span class="stat-value" id="dataCount">—</span>
        </div>
        <div class="status">Readings collected</div>
      </div>
    </div>

    <div class="chart-container">
      <h3 class="chart-title">Voltage Over Time (Last 7 Days)</h3>
      <canvas id="voltageChart"></canvas>
      <div class="timestamp" id="chartTimestamp"></div>
    </div>

    <div class="panel-status-card">
      <div class="panel-status-title">New Panel Status</div>
      <div class="bc-grid">
        <input id="contractAddressInput" placeholder="Contract address (0x...)" />
        <input id="ipfsGatewayInput" placeholder="IPFS gateway base (https://gateway.pinata.cloud/ipfs/)" />
      </div>
      <div id="panelStatusBadge" class="panel-status-badge idle">IDLE</div>
      <p id="panelStatusMessage">No checks run yet.</p>
      <p class="timestamp" id="panelStatusTime"></p>
      <p class="timestamp" id="dashboardModeLabel"></p>
    </div>
  </div>

  <script>
    let chart = null;
    let autoRefreshInterval = null;
    let autoRefreshEnabled = true;
    let appConfig = null;
    let walletAddress = null;
    function getWeb3ChainId() {
      return appConfig?.chainId ?? 11155111;
    }
    function getWeb3ChainHex() {
      return appConfig?.chainIdHex ?? "0xaa36a7";
    }
    function getWeb3ChainName() {
      return appConfig?.chainName ?? "Sepolia";
    }
    const PANEL_CHECK_ABI = [
      "function requestVoltageCheck(string ipfsGatewayUrl) external returns (bytes32)"
    ];

    const API_BASE = window.location.origin;

    function showAlert(message, type = 'info') {
      const container = document.getElementById('alertContainer');
      const alert = document.createElement('div');
      alert.className = `alert ${type}`;
      alert.textContent = message;
      container.appendChild(alert);

      setTimeout(() => {
        alert.remove();
      }, 5000);
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleString();
    }

    function formatDate(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleDateString();
    }

    function updateWarningBanner(warning) {
      const banner = document.getElementById('criticalWarning');
      if (!warning || !warning.active) {
        banner.style.display = 'none';
        banner.textContent = '';
        return;
      }
      banner.style.display = 'block';
      banner.textContent = warning.message || 'NON-WARRANTY BOARD MALFUNCTION: sudden drop detected.';
    }

    function updatePanelStatus(panelStatus, mode) {
      const badge = document.getElementById('panelStatusBadge');
      const message = document.getElementById('panelStatusMessage');
      const time = document.getElementById('panelStatusTime');
      const modeLabel = document.getElementById('dashboardModeLabel');

      const state = panelStatus?.state || 'idle';
      badge.className = `panel-status-badge ${state}`;
      badge.textContent = state.toUpperCase();
      message.textContent = panelStatus?.message || 'No checks run yet.';
      time.textContent = panelStatus?.checkedAt ? `Last check: ${formatTime(panelStatus.checkedAt)}` : '';
      modeLabel.textContent = `Data source mode: ${mode || 'unknown'}`;
    }

    function setPanelStatus(state, message) {
      updatePanelStatus({
        state,
        message,
        checkedAt: Date.now(),
      }, appConfig?.mode);
    }

    function ensureSuffixSlash(url) {
      if (!url) return '';
      return url.endsWith('/') ? url : `${url}/`;
    }

    function shortAddr(addr) {
      if (!addr) return "not connected";
      return `${addr.slice(0, 6)}...${addr.slice(-4)}`;
    }

    async function connectWallet() {
      if (!window.ethereum) {
        showAlert('MetaMask not found in browser.', 'error');
        setPanelStatus('error', 'MetaMask not found.');
        return null;
      }
      try {
        const provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        const network = await provider.getNetwork();
        if (Number(network.chainId) !== getWeb3ChainId()) {
          try {
            await window.ethereum.request({
              method: "wallet_switchEthereumChain",
              params: [{ chainId: getWeb3ChainHex() }],
            });
          } catch (switchErr) {
            showAlert(`Please switch MetaMask to ${getWeb3ChainName()}.`, 'error');
            setPanelStatus('error', `Wrong chain: switch to ${getWeb3ChainName()}.`);
            return null;
          }
        }
        const signer = await provider.getSigner();
        walletAddress = await signer.getAddress();
        showAlert(`Wallet connected: ${shortAddr(walletAddress)}`, 'success');
        setPanelStatus('ok', `Wallet connected: ${shortAddr(walletAddress)} on ${getWeb3ChainName()}.`);
        return { provider, signer };
      } catch (err) {
        console.error(err);
        showAlert('Failed to connect MetaMask.', 'error');
        setPanelStatus('error', 'Failed to connect MetaMask.');
        return null;
      }
    }

    async function loadConfig() {
      try {
        const res = await fetch(`${API_BASE}/api/config`);
        appConfig = await res.json();
        if (appConfig?.defaultContractAddress) {
          document.getElementById('contractAddressInput').value = appConfig.defaultContractAddress;
        }
        if (appConfig?.defaultIpfsGatewayBase) {
          document.getElementById('ipfsGatewayInput').value = appConfig.defaultIpfsGatewayBase;
        } else {
          document.getElementById('ipfsGatewayInput').value = 'https://gateway.pinata.cloud/ipfs/';
        }
      } catch {
        document.getElementById('ipfsGatewayInput').value = 'https://gateway.pinata.cloud/ipfs/';
      }
    }

    async function loadData() {
      try {
        const [dataRes, statsRes] = await Promise.all([
          fetch(`${API_BASE}/api/data`),
          fetch(`${API_BASE}/api/stats`),
        ]);

        const data = await dataRes.json();
        const stats = await statsRes.json();

        updateStats(stats);
        updateChart(data.data);
        updateWarningBanner(stats.warning);
        updatePanelStatus(stats.panelStatus, stats.mode);

        if (stats.lastUpdate) {
          document.getElementById('chartTimestamp').textContent =
            `Last update: ${formatTime(stats.lastUpdate)}`;
        }

        if (stats.current) {
          document.getElementById('currentStatus').className = 'status loading';
          document.getElementById('currentStatus').textContent =
            `Connected - ${stats.count} readings`;
        }
      } catch (error) {
        console.error('Error loading data:', error);
        showAlert('Failed to load data from server', 'error');
      }
    }

    function updateStats(stats) {
      document.getElementById('currentVoltage').textContent =
        stats.current !== null ? parseFloat(stats.current).toFixed(3) : '—';

      document.getElementById('avgVoltage').textContent =
        stats.avg ? parseFloat(stats.avg).toFixed(3) : '—';

      document.getElementById('minMaxVoltage').textContent =
        stats.min && stats.max ? `${stats.min} / ${stats.max}` : '— / —';

      document.getElementById('dataCount').textContent =
        stats.count > 0 ? stats.count : '—';
    }

    async function runPanelCheck() {
      const contractAddress = document.getElementById('contractAddressInput').value.trim();
      const gatewayBase = ensureSuffixSlash(document.getElementById('ipfsGatewayInput').value.trim());
      if (!contractAddress) {
        showAlert('Enter contract address first.', 'error');
        setPanelStatus('error', 'Contract address is empty.');
        return;
      }

      if (!gatewayBase) {
        showAlert('Enter IPFS gateway base first.', 'error');
        setPanelStatus('error', 'IPFS gateway base is empty.');
        return;
      }

      try {
        setPanelStatus('running', 'Loading latest IPFS hash from server...');
        const ipfsRes = await fetch(`${API_BASE}/ipfs`);
        const ipfsData = await ipfsRes.json();
        if (!ipfsData?.lastIpfsHash) {
          showAlert('No IPFS hash yet. Send data from ESP32 first.', 'error');
          setPanelStatus('error', 'No IPFS hash available yet.');
          return;
        }

        const ipfsUrl = `${gatewayBase}${ipfsData.lastIpfsHash}`;
        const wallet = await connectWallet();
        if (!wallet) return;

        setPanelStatus('running', 'Sending transaction to requestVoltageCheck...');
        const contract = new ethers.Contract(contractAddress, PANEL_CHECK_ABI, wallet.signer);
        const tx = await contract.requestVoltageCheck(ipfsUrl);
        setPanelStatus('running', `Transaction sent: ${tx.hash}`);
        showAlert(`Panel check tx sent: ${tx.hash}`, 'success');

        await tx.wait(1);
        setPanelStatus('ok', `New Panel Status: on-chain panel check requested. Tx confirmed: ${tx.hash}`);
        showAlert(`Panel check transaction confirmed on ${getWeb3ChainName()}.`, 'success');
      } catch (error) {
        console.error('Panel check error:', error);
        const msg = error?.shortMessage || error?.message || 'Failed to run panel check';
        setPanelStatus('error', msg);
        showAlert(msg, 'error');
      }
    }

    function updateChart(data) {
      if (!data || data.length === 0) {
        const ctx = document.getElementById('voltageChart');
        const container = ctx.parentElement;
        const emptyState = document.createElement('div');
        emptyState.className = 'empty-state';
        emptyState.innerHTML = `
          <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="50" cy="50" r="45"/>
            <text x="50" y="60" text-anchor="middle" font-size="40">—</text>
          </svg>
          <p>No data available yet. Send data from the sensor to see the graph.</p>
        `;
        ctx.style.display = 'none';
        if (!container.querySelector('.empty-state')) {
          container.appendChild(emptyState);
        }
        return;
      }

      const ctx = document.getElementById('voltageChart');
      if (ctx.parentElement.querySelector('.empty-state')) {
        ctx.parentElement.querySelector('.empty-state').remove();
      }
      ctx.style.display = 'block';

      const labels = data.map((d) =>
        new Date(d.timestamp).toLocaleTimeString('en-US', {
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
        })
      );

      const voltages = data.map((d) => parseFloat(d.voltage));

      const chartData = {
        labels,
        datasets: [
          {
            label: 'Voltage (V)',
            data: voltages,
            borderColor: '#667eea',
            backgroundColor: 'rgba(102, 126, 234, 0.1)',
            borderWidth: 3,
            fill: true,
            tension: 0.4,
            pointRadius: 3,
            pointBackgroundColor: '#667eea',
            pointBorderColor: '#fff',
            pointBorderWidth: 2,
            pointHoverRadius: 6,
          },
        ],
      };

      if (chart) {
        chart.data = chartData;
        chart.update();
      } else {
        chart = new Chart(ctx, {
          type: 'line',
          data: chartData,
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                display: true,
                labels: {
                  font: { size: 12, weight: 'bold' },
                  color: '#667eea',
                  padding: 15,
                },
              },
              tooltip: {
                backgroundColor: 'rgba(0, 0, 0, 0.8)',
                padding: 12,
                titleFont: { size: 13, weight: 'bold' },
                bodyFont: { size: 12 },
                borderColor: '#667eea',
                borderWidth: 1,
                callbacks: {
                  label: function (context) {
                    return `Voltage: ${context.parsed.y.toFixed(3)} V`;
                  },
                },
              },
            },
            scales: {
              y: {
                beginAtZero: false,
                grid: {
                  color: 'rgba(0, 0, 0, 0.05)',
                  drawBorder: false,
                },
                ticks: {
                  color: '#999',
                  font: { size: 11 },
                  callback: function (value) {
                    return value.toFixed(2) + ' V';
                  },
                },
              },
              x: {
                grid: {
                  display: false,
                  drawBorder: false,
                },
                ticks: {
                  color: '#999',
                  font: { size: 10 },
                  maxRotation: 45,
                  minRotation: 0,
                },
              },
            },
          },
        });
      }
    }

    function setAutoRefresh(enabled) {
      autoRefreshEnabled = enabled;

      if (enabled) {
        loadData();
        autoRefreshInterval = setInterval(loadData, 5000);
        document.querySelectorAll('button').forEach((btn) => {
          btn.classList.remove('active');
        });
        document.querySelectorAll('button')[0].classList.add('active');
        showAlert('Auto-refresh enabled - updates every 5 seconds', 'success');
      } else {
        if (autoRefreshInterval) {
          clearInterval(autoRefreshInterval);
        }
        document.querySelectorAll('button').forEach((btn) => {
          btn.classList.remove('active');
        });
        document.querySelectorAll('button')[1].classList.add('active');
        showAlert('Auto-refresh disabled', 'info');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadConfig();
      setAutoRefresh(true);
    });
  </script>
</body>
</html>
